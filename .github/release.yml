# Configuration for GitHub's automatic release notes (used by GoReleaser's changelog.use: github-native).
# PRs are grouped by their labels. PRs with no matching label go into "Other Changes".
# Apply labels on PRs before merging for best results.
changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "🚀 New Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔒 Security"
      labels:
        - security
    - title: "📝 Documentation"
      labels:
        - documentation
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking-change
    - title: "🔧 Other Changes"
      labels:
        - other
