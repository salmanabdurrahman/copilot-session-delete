name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Tool version
      description: Output of `copilot-session-delete --version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon / arm64)
        - macOS (Intel / amd64)
        - Linux (amd64)
        - Linux (arm64)
        - Windows (amd64)
        - Other
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version (if built from source)
      description: Output of `go version`
      placeholder: "go1.21.0 darwin/arm64"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include the exact command you ran.
      placeholder: "I ran `copilot-session-delete delete --id ...` and got..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `...`
        2. Press `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any terminal output or error messages here.
      render: shell

  - type: checkboxes
    id: dry-run
    attributes:
      label: Did you test with --dry-run first?
      options:
        - label: "Yes, I reproduced this with `--dry-run`"
        - label: "This bug occurs without `--dry-run`"
        - label: "Not applicable"

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest released version
          required: true
